{% extends "base.html" %}

{% block title %}Verify OTP - Campus Lost & Found{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-card--unified">
        <div class="auth-header">
            <h2>Enter OTP</h2>
            <p class="text-muted">A 6-digit code was sent to <strong>{{ phone }}</strong></p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group otp-group">
                <input type="text" name="otp" maxlength="6"
                       placeholder="------" class="form-control otp-input"
                       autofocus inputmode="numeric" pattern="[0-9]{6}" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="verifyBtn">Verify OTP</button>
        </form>
        <p class="auth-footer">
            Did not receive it?
            <a href="{{ url_for('phone_resend') }}">Resend OTP</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('phone_login') }}">Change number</a>
        </p>
        <p class="otp-timer" id="otpTimer">OTP expires in <span id="countdown">5:00</span></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let seconds = 300;
const el = document.getElementById('countdown');
const btn = document.getElementById('verifyBtn');
const interval = setInterval(() => {
  seconds--;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  el.textContent = m + ':' + String(s).padStart(2, '0');
  if (seconds <= 0) {
    clearInterval(interval);
    el.textContent = 'Expired';
    if (btn) btn.disabled = true;
  }
}, 1000);
</script>
{% endblock %}
