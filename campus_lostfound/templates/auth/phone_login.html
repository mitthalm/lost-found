{% extends "base.html" %}

{% block title %}Phone Sign In - Campus Lost & Found{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-card--unified">
        <div class="auth-header">
            <h2>Sign in with Phone</h2>
            <p class="text-muted">Enter your mobile number with country code.</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="phone_number">Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" placeholder="+91 9876543210"
                       class="form-control" required>
                <small>Include country code, e.g. +91 for India</small>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send OTP</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
</div>
{% endblock %}
