{% extends "base.html" %}

{% block title %}Login - Campus Lost & Found{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-card--unified">
        <div class="auth-header">
            <div class="lf-badge" aria-hidden="true">
                <span class="lf-top">LOST</span>
                <span class="lf-amp">&</span>
                <span class="lf-bottom">FOUND</span>
            </div>
            <h2>Sign In</h2>
            <p>Welcome back to Campus Lost &amp; Found</p>
        </div>

        {% include 'auth/_social_auth.html' %}

        <form method="POST" class="auth-form">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="form-control" placeholder="your.email@campus.edu">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position:relative;">
                    <input type="password" id="password" name="password" required class="form-control" placeholder="Enter your password">
                    <span class="toggle-password" onclick="togglePassword('password', this)" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:#888;">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-footer">
            No account? <a href="{{ url_for('signup') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
